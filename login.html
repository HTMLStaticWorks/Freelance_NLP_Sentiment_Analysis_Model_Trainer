<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NLP Sentiment Consultant</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/2563eb/brain.png">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-color);">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="nav-logo mb-3 d-block mx-auto" style="width: fit-content;">
                            <i class="fas fa-brain text-accent me-2"></i>
                            <span class="text-accent">NLP</span>Consultant
                        </a>
                        <h2 class="h3">Welcome Back</h2>
                        <p class="text-secondary">Sign in to your ML Workspace</p>
                    </div>
                    <form>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@company.com">
                        </div>
                        <div class="form-group">
                            <div class="d-flex justify-content-between mb-1">
                                <label class="form-label mb-0">Password</label>
                                <a href="#" class="small text-accent">Forgot Password?</a>
                            </div>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="form-group d-flex align-items-center gap-2 mb-4">
                            <input type="checkbox" id="remember"
                                style="accent-color: var(--accent-color); cursor: pointer;">
                            <label for="remember" class="small text-secondary mb-0" style="cursor: pointer;">Remember
                                Me</label>
                        </div>
                        <button class="btn btn-primary w-100 mb-4">Sign In</button>

                        <div class="text-center">
                            <p class="small text-secondary">Don't have an account? <a href="signup.html"
                                    class="text-accent fw-600">Request Access</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
</body>

</html>
