<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NLP Sentiment Consultant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/2563eb/brain.png">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-color);">

    <div class="page-toggles">
        <button class="rtl-toggle btn btn-outline" style="padding: 0.5rem 1rem;">RTL</button>
        <button class="theme-toggle btn btn-outline" style="padding: 0.5rem 1rem;">
            <i class="fas fa-sun"></i>
        </button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card p-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="nav-logo mb-3 d-block mx-auto" style="width: fit-content;">
                            <i class="fas fa-brain text-accent me-2"></i>
                            <span class="text-accent">NLP</span>Consultant
                        </a>
                        <h2 class="h3">Join the Lab</h2>
                        <p class="text-secondary">Request access to the analytics dashboard</p>
                    </div>
                    <form>
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Organization Email</label>
                            <input type="email" class="form-control" placeholder="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Desired Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" placeholder="">
                                <button type="button" class="password-toggle">
                                    <i class="far fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Primary NLP Use-Case</label>
                            <select class="form-control">
                                <option>Social Media Monitoring</option>
                                <option>Customer Support Automation</option>
                                <option>Market Research</option>
                                <option>Academic Research</option>
                            </select>
                        </div>
                        <div class="form-group d-flex align-items-start gap-2 mb-4">
                            <input type="checkbox" id="terms" style="margin-top: 4px; accent-color: var(--accent-color); cursor: pointer;" required>
                            <label for="terms" class="small text-secondary" style="cursor: pointer;">
                                I agree to the <a href="#" class="text-accent">Terms of Service</a> and <a href="#" class="text-accent">Privacy Policy</a>
                            </label>
                        </div>
                        <button class="btn btn-primary w-100 mb-4">Request Credentials</button>

                        <div class="divider">or sign up with</div>

                        <div class="social-login-group">
                            <a href="#" class="btn-social" title="Sign up with Google">
                                <i class="fab fa-google"></i>
                            </a>
                            <a href="#" class="btn-social" title="Sign up with Apple">
                                <i class="fab fa-apple"></i>
                            </a>
                        </div>
                        
                        <div class="text-center">
                            <p class="small text-secondary">Already have access? <a href="login.html" class="text-accent fw-600">Sign In</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/password-toggle.js"></script>
</body>
</html>
