<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NLP Sentiment Consultant</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/2563eb/brain.png">
    <style>
        @media (max-width: 480px) {
            .auth-meta-text {
                font-size: 0.7rem !important;
            }
        }
    </style>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-color);">

    <div class="page-toggles">
        <button class="rtl-toggle btn btn-outline" style="padding: 0.5rem 1rem;">RTL</button>
        <button class="theme-toggle btn btn-outline" style="padding: 0.5rem 1rem;">
            <i class="fas fa-sun"></i>
        </button>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card p-5">
                    <div class="text-center mb-5">
                        <a href="index.html" class="nav-logo mb-3 d-block mx-auto" style="width: fit-content;">
                            <i class="fas fa-brain text-accent me-2"></i>
                            <span class="text-accent">NLP</span>Consultant
                        </a>
                        <h2 class="h3">Welcome Back</h2>
                        <p class="text-secondary">Sign in to your ML Workspace</p>
                    </div>
                    <form>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" placeholder="">
                                <button type="button" class="password-toggle">
                                    <i class="far fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group d-flex align-items-center justify-content-between gap-2 mb-4">
                            <div class="d-flex align-items-center gap-2">
                                <input type="checkbox" id="remember"
                                    style="accent-color: var(--accent-color); cursor: pointer;">
                                <label for="remember" class="small text-secondary mb-0 auth-meta-text" style="cursor: pointer; white-space: nowrap;">Remember
                                    Me</label>
                            </div>
                            <a href="#" class="small text-accent auth-meta-text" style="white-space: nowrap;">Forgot Password?</a>
                        </div>
                        <button class="btn btn-primary w-100 mb-4">Sign In</button>

                        <div class="divider">or continue with</div>

                        <div class="social-login-group">
                            <a href="#" class="btn-social" title="Continue with Google">
                                <i class="fab fa-google"></i>
                            </a>
                            <a href="#" class="btn-social" title="Continue with Apple">
                                <i class="fab fa-apple"></i>
                            </a>
                        </div>

                        <div class="text-center">
                            <p class="small text-secondary">Don't have an account? <a href="signup.html"
                                    class="text-accent fw-600">Request Access</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/password-toggle.js"></script>
</body>

</html>
